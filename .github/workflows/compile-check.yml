# Fast compile validation (~2-4 min host-only changes). No image push.
# Use this for debug iteration; docker-build.yml still publishes Salad images.
name: Compile check

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: propminer-compile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  host-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host test deps
        run: sudo apt-get update && sudo apt-get install -y clang python3

      - name: Host-only unit tests
        run: ./scripts/local_host_tests.sh

      - name: Tune script dry-run (no GPU)
        run: ./scripts/test_tune_full_dry.sh

  compile:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ehab-moustafa
          password: ${{ secrets.GHCR_PAT }}

      - name: Build propminer (builder target, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          platforms: linux/amd64
          push: false
          load: false
          provenance: false
          cache-from: |
            type=registry,ref=ghcr.io/ehab-moustafa/propminer-rtx5090:buildcache
            type=gha,scope=propminer-gemm
            type=gha,scope=propminer-host
          cache-to: |
            type=registry,ref=ghcr.io/ehab-moustafa/propminer-rtx5090:buildcache,mode=max
            type=gha,mode=max,scope=propminer-gemm
            type=gha,mode=max,scope=propminer-host
