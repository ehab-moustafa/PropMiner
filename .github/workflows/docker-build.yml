name: Build and push PropMiner RTX 5090 image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: propminer-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        run: |
          echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE '^third_party/pearl-gemm/|^CMakeLists.txt'; then
            echo "gemm_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "gemm_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ehab-moustafa
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ehab-moustafa/propminer-rtx5090:latest
            ghcr.io/ehab-moustafa/propminer-rtx5090:${{ steps.meta.outputs.tag }}
            ghcr.io/ehab-moustafa/propminer-rtx5090:dev
            ghcr.io/ehab-moustafa/propminer-rtx5090:v1.24-rtx5090
            ghcr.io/ehab-moustafa/propminer-rtx5090:v1.25-rtx5090
          provenance: false
          cache-from: |
            type=gha,scope=propminer-gemm
            type=gha,scope=propminer-host
          cache-to: |
            type=gha,mode=max,scope=propminer-${{ steps.meta.outputs.gemm_changed == 'true' && 'gemm' || 'host' }}
