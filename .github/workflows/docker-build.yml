name: Build and push PropMiner RTX 5090 image

on:
  push:
    branches: [master, main]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        run: |
          echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ehab-moustafa
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ehab-moustafa/propminer-rtx5090:latest
            ghcr.io/ehab-moustafa/propminer-rtx5090:${{ steps.meta.outputs.tag }}
            ghcr.io/ehab-moustafa/propminer-rtx5090:v1.4-rtx5090
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
