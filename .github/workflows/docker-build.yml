name: Build and push PropMiner RTX 5090 image

on:
  push:
    branches: [master, main]
    paths:
      - Dockerfile
      - scripts/**
      - results/**
      - .github/workflows/docker-build.yml
  workflow_dispatch:
    inputs:
      build_runtime:
        description: Also build full runtime image with baked-in binaries
        type: boolean
        default: false
      build_devel:
        description: Also build devel image (nvcc + full source)
        type: boolean
        default: false

concurrency:
  group: propminer-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        run: |
          echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.build_runtime }}" == "true" ]]; then
            echo "build_runtime=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_runtime=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.build_devel }}" == "true" ]]; then
            echo "build_devel=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_devel=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ehab-moustafa
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push bootstrap image (Salad fast-deploy)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: bootstrap
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ehab-moustafa/propminer-rtx5090:bootstrap
            ghcr.io/ehab-moustafa/propminer-rtx5090:latest
          provenance: false
          cache-from: |
            type=registry,ref=ghcr.io/ehab-moustafa/propminer-rtx5090:buildcache-bootstrap
          cache-to: |
            type=registry,ref=ghcr.io/ehab-moustafa/propminer-rtx5090:buildcache-bootstrap,mode=max

      - name: Build and push full runtime image (optional)
        if: steps.meta.outputs.build_runtime == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ehab-moustafa/propminer-rtx5090:runtime
            ghcr.io/ehab-moustafa/propminer-rtx5090:${{ steps.meta.outputs.tag }}
          provenance: false
          cache-from: |
            type=registry,ref=ghcr.io/ehab-moustafa/propminer-rtx5090:buildcache
            type=gha,scope=propminer-gemm
            type=gha,scope=propminer-host
          cache-to: |
            type=registry,ref=ghcr.io/ehab-moustafa/propminer-rtx5090:buildcache,mode=max
            type=gha,mode=max,scope=propminer-gemm
            type=gha,mode=max,scope=propminer-host

      - name: Build and push devel image (optional)
        if: steps.meta.outputs.build_devel == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: devel
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ehab-moustafa/propminer-rtx5090:devel
          provenance: false
          cache-from: |
            type=registry,ref=ghcr.io/ehab-moustafa/propminer-rtx5090:buildcache
            type=gha,scope=propminer-gemm
            type=gha,scope=propminer-host
            type=gha,scope=propminer-devel
          cache-to: |
            type=gha,mode=max,scope=propminer-devel
