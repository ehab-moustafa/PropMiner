name: Build and push PropMiner RTX 5090 image

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      build_devel:
        description: Also build and push devel image (adds ~5 min)
        type: boolean
        default: false

concurrency:
  group: propminer-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        run: |
          echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE '^third_party/pearl-gemm/|^CMakeLists.txt'; then
            echo "gemm_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "gemm_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.build_devel }}" == "true" ]]; then
            echo "build_devel=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_devel=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ehab-moustafa
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ehab-moustafa/propminer-rtx5090:latest
            ghcr.io/ehab-moustafa/propminer-rtx5090:${{ steps.meta.outputs.tag }}
            ghcr.io/ehab-moustafa/propminer-rtx5090:dev
            ghcr.io/ehab-moustafa/propminer-rtx5090:v1.48-full-rtx5090
          provenance: false
          cache-from: |
            type=registry,ref=ghcr.io/ehab-moustafa/propminer-rtx5090:buildcache
            type=gha,scope=propminer-gemm
            type=gha,scope=propminer-host
          cache-to: |
            type=registry,ref=ghcr.io/ehab-moustafa/propminer-rtx5090:buildcache,mode=max
            type=gha,mode=max,scope=propminer-gemm
            type=gha,mode=max,scope=propminer-host

      - name: Build and push devel image (nvcc + full source)
        if: steps.meta.outputs.build_devel == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: devel
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ehab-moustafa/propminer-rtx5090:devel
            ghcr.io/ehab-moustafa/propminer-rtx5090:v1.48-devel-rtx5090
          provenance: false
          cache-from: |
            type=registry,ref=ghcr.io/ehab-moustafa/propminer-rtx5090:buildcache
            type=gha,scope=propminer-gemm
            type=gha,scope=propminer-host
            type=gha,scope=propminer-devel
          cache-to: |
            type=gha,mode=max,scope=propminer-devel
